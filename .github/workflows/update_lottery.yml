name: Update Lottery Data

on:
  schedule:
    # සෑම විනාඩි 20කට වරක් ක්‍රියාත්මක වේ (මෙහි 20 වෙනුවට 10 දැමිය හැක, නමුත් 20 නිර්දේශ කරමි)
    - cron: '*/20 * * * *'
  workflow_dispatch: # අවශ්‍ය විටක manual run කිරීමට

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Scraper
      run: python main.py

    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add nlb_txt/*.txt dlb_txt/*.txt
        git commit -m "Auto-update lottery results [skip ci]" || echo "No changes to commit"
        git push
