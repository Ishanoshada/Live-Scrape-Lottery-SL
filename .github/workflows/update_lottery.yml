name: Update Lottery Data

on:
  schedule:
    # සෑම පැය 5කට වරක් (විනාඩි 300කට වරක්) ක්‍රියාත්මක වේ. 
    - cron: '0 */5 * * *'
  workflow_dispatch: # අවශ්‍ය විටක manual run කිරීමට

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write  
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    # 1 වැනි පියවර: දත්ත ලබා ගැනීම සහ Table එක Update කිරීම
    - name: Run Scraper
      run: python main.py

    # 2 වැනි පියවර: දත්ත විශ්ලේෂණය කර README එකට Report එක දැමීම
    - name: Run Data Analyzer
      run: python analyzer.py

    # 3 වැනි පියවර: වෙනස්කම් ගබඩාවට Push කිරීම
    - name: Commit and Push changes
      run: |
        git config --global user.name "GitHub Action"
        git config --global user.email "action@github.com"
        git add nlb_txt/*.txt dlb_txt/*.txt README.md
        git commit -m "Auto-update lottery results and Analytics README [skip ci]" || echo "No changes to commit"
        git push